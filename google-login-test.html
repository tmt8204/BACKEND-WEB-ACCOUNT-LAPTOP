<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Google Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f4f6fb;
        color: #1f2937;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      }
      h1 {
        font-size: 24px;
        margin-bottom: 16px;
      }
      #message {
        margin-top: 20px;
        padding: 14px;
        border-radius: 10px;
        background: #eef2ff;
        color: #3730a3;
        display: none;
      }
      #message.error {
        background: #fee2e2;
        color: #b91c1c;
      }
      #message pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .note {
        margin-top: 18px;
        font-size: 14px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Test Google Login</h1>
      <p>Nhấn nút bên dưới để đăng nhập với Google và gửi <code>idToken</code> tới backend.</p>
      <div id="g_id_signin"></div>
      <div id="message"></div>
      <p class="note">
        Lưu ý: backend phải chạy và cho phép origin của trang này trong cấu hình Google OAuth.
        Nếu bạn dùng file tĩnh, hãy mở nó qua một server địa phương như <code>http://localhost:5500</code> hoặc <code>http://127.0.0.1:5500</code>.
      </p>
    </div>

    <script>
      const backendUrl = 'http://localhost:5000/api/v1/auth/google';
      const clientId = '290599304770-cu7uj4mccvp6d09gj84ohkoc8k479nv9.apps.googleusercontent.com';

      function showMessage(text, isError = false) {
        const message = document.getElementById('message');
        message.textContent = text;
        message.className = isError ? 'error' : '';
        message.style.display = 'block';
      }

      function handleCredentialResponse(response) {
        if (!response || !response.credential) {
          showMessage('Không nhận được idToken từ Google.', true);
          return;
        }

        const payload = { idToken: response.credential };
        console.log('idToken:', response.credential);

        fetch(backendUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        })
          .then(async (res) => {
            const body = await res.text();
            try {
              const json = JSON.parse(body);
              if (!res.ok) throw new Error(JSON.stringify(json, null, 2));
              showMessage('Đăng nhập thành công!\n' + JSON.stringify(json, null, 2));
            } catch (err) {
              showMessage('Lỗi khi gọi backend:\n' + body, true);
            }
          })
          .catch((err) => {
            showMessage('Lỗi fetch: ' + err.message, true);
          });
      }

      window.onload = () => {
        google.accounts.id.initialize({
          client_id: clientId,
          callback: handleCredentialResponse,
        });

        google.accounts.id.renderButton(
          document.getElementById('g_id_signin'),
          { theme: 'outline', size: 'large', width: 300 }
        );

        google.accounts.id.prompt();
      };
    </script>
  </body>
</html>
